<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador Live TV - M3U Studio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(20, 20, 20, 0.7);
            --primary: #E50914; 
            --primary-hover: #b80710;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --success: #1db954;
            --warning: #f5a623;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at 50% 0%, #2a0808 0%, var(--bg-color) 60%);
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }
        
        .container { 
            background: var(--surface); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            padding: 40px 30px; width: 100%; max-width: 450px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .logo-txt { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .red-text { color: var(--primary); }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
        
        .form-group { margin-bottom: 16px; position: relative; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .inp { 
            width: 100%; padding: 15px 16px; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); color: #fff; font-weight: 500; 
            border-radius: 12px; font-size: 14px; transition: all 0.3s ease;
        }
        .inp:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.1); }
        
        select.inp { appearance: none; cursor: pointer; font-weight: 600; }
        .select-wrapper::after {
            content: '\f078'; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; right: 18px; top: 42px; color: var(--text-muted); pointer-events: none; font-size: 12px;
        }

        .btn { 
            width: 100%; padding: 16px; margin-top: 15px; background: var(--primary); 
            color: #fff; border: none; font-weight: 700; border-radius: 12px; font-size: 16px; 
            cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(229, 9, 20, 0.4); }
        .btn:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .status-container { display: none; text-align: center; margin-top: 20px; animation: fadeIn 0.3s; }
        .loader { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        .status-text { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-area { margin-top: 25px; display: none; background: rgba(29, 185, 84, 0.1); padding: 25px; border-radius: 14px; border: 1px solid rgba(29, 185, 84, 0.3); text-align: center; animation: slideDown 0.4s; }
        .success-icon { font-size: 40px; color: var(--success); margin-bottom: 15px; }
        .stats { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; font-weight: 500; }
        .stats span { display: block; color: #fff; font-weight: 800; font-size: 20px; margin-top: 5px; }
        .user-validity { font-size: 12px; color: var(--warning); margin-top: 8px; font-weight: 700; }
        
        .btn-download { display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; padding: 15px; background: var(--success); color: #111; text-decoration: none; border-radius: 12px; font-weight: 800; font-size: 15px; transition: 0.3s; }
        .btn-download:hover { background: #1ed760; transform: translateY(-2px); }

        .btn-reset { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-weight: 600; border-radius: 10px; font-size: 13px; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn-reset:hover { background: rgba(255,255,255,0.05); color: #fff; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(20,20,20,0.95); color: #fff; padding: 15px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px; border-left: 4px solid var(--primary); animation: slideInRight 0.3s ease forwards; }
        .toast.success { border-left-color: var(--success); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
    <div class="header">
        <div class="logo-txt"><i class="fas fa-tv red-text"></i> LIVE <span class="red-text">M3U</span></div>
        <div class="subtitle">Gerador de TV Ao Vivo com Vencimento</div>
    </div>

    <form id="mainForm" onsubmit="event.preventDefault(); App.start();">
        <div class="form-group">
            <label>URL do Servidor</label>
            <input type="url" id="serverUrl" class="inp" placeholder="Ex: http://tv.com:8080" required autocomplete="url">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Usuário</label>
                <input type="text" id="username" class="inp" placeholder="Login" required autocomplete="username">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Senha</label>
                <input type="password" id="password" class="inp" placeholder="Senha" required autocomplete="current-password">
            </div>
        </div>
        
        <div class="form-group select-wrapper">
            <label>Formato da Lista</label>
            <select id="format" class="inp">
                <option value="ts">MPEG-TS (.ts) - Padrão Smart TVs</option>
                <option value="m3u8">HLS (.m3u8) - Web / Apps Mobile</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nome do Arquivo (Prefixo)</label>
            <input type="text" id="customFileName" class="inp" placeholder="Ex: Cliente_Joao" required autocomplete="off">
        </div>
        
        <button type="submit" class="btn" id="btnSubmit">
            <i class="fas fa-bolt"></i> GERAR LISTA AO VIVO
        </button>
    </form>

    <div id="statusContainer" class="status-container">
        <div class="loader"></div>
        <div class="status-text" id="statusText">Conectando...</div>
    </div>

    <div id="resultArea" class="result-area">
        <i class="fas fa-check-circle success-icon"></i>
        <div class="stats" id="statsText"></div>
        <a id="downloadBtn" href="#" class="btn-download">
            <i class="fas fa-download"></i> BAIXAR ARQUIVO
        </a>
        <button type="button" class="btn-reset" onclick="App.resetForm()">Gerar Nova Lista</button>
    </div>
</div>

<script>
    const App = {
        config: { server: "", user: "", pass: "", format: "", prefix: "", expDateStr: "" },
        
        showToast: (msg, type = 'error') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-info-circle"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        },

        fetchData: async (url, isJson = true) => {
            const timestamp = `_t=${new Date().getTime()}`;
            const finalUrl = url.includes('?') ? `${url}&${timestamp}` : `${url}?${timestamp}`;
            const isHttps = window.location.protocol === 'https:';
            const needsProxy = isHttps && finalUrl.startsWith('http://');
            
            try {
                if (needsProxy) throw new Error('CORS');
                const res = await fetch(finalUrl);
                return isJson ? await res.json() : await res.text();
            } catch (error) {
                try {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(finalUrl)}`;
                    const resProxy = await fetch(proxyUrl);
                    return isJson ? await resProxy.json() : await resProxy.text();
                } catch (err) { return null; }
            }
        },

        updateStatus: (msg) => document.getElementById('statusText').innerText = msg,
        
        handleError: (msg) => {
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
            App.showToast(msg, "error");
        },

        start: async () => {
            const s = document.getElementById('serverUrl').value.trim().replace(/\/$/, "");
            App.config.server = s.startsWith('http') ? s : `http://${s}`;
            App.config.user = document.getElementById('username').value.trim();
            App.config.pass = document.getElementById('password').value.trim();
            App.config.format = document.getElementById('format').value;
            App.config.prefix = document.getElementById('customFileName').value.trim() || "TV";

            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('statusContainer').style.display = 'block';
            
            try {
                // Etapa 1: Puxar Vencimento da Conta
                App.updateStatus("Verificando Validade da Conta...");
                const authUrl = `${App.config.server}/player_api.php?username=${App.config.user}&password=${App.config.pass}`;
                const authData = await App.fetchData(authUrl);

                if (!authData || !authData.user_info) {
                    return App.handleError("Autenticação falhou. Usuário ou senha incorretos.");
                }

                const expTimestamp = parseInt(authData.user_info.exp_date);
                if (expTimestamp && expTimestamp > 0) {
                    const d = new Date(expTimestamp * 1000);
                    const dia = String(d.getDate()).padStart(2, '0');
                    const mes = String(d.getMonth() + 1).padStart(2, '0');
                    const ano = d.getFullYear();
                    App.config.expDateStr = `${dia}-${mes}-${ano}`;
                } else {
                    App.config.expDateStr = "Ilimitado";
                }

                // Etapa 2: Gerar Lista de Canais
                await App.generateLiveTV();

            } catch (err) {
                App.handleError("Ocorreu um erro inesperado na comunicação.");
            }
        },

        generateLiveTV: async () => {
            const { server, user, pass, format } = App.config;

            App.updateStatus("Baixando Categorias Ao Vivo...");
            const cats = await App.fetchData(`${server}/player_api.php?username=${user}&password=${pass}&action=get_live_categories`);
            if(!cats) return App.handleError("Falha ao obter categorias do servidor.");

            const catMap = cats.reduce((map, c) => { map[c.category_id] = c.category_name; return map; }, {});

            App.updateStatus("Extraindo Canais...");
            const streams = await App.fetchData(`${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`);
            if (!streams || !streams.length) return App.handleError("Nenhum canal encontrado para este usuário.");

            let m3u = '#EXTM3U size="Medium"\n';
            streams.forEach(item => {
                const name = item.name || "Unknown";
                const catName = catMap[item.category_id] || "Sem Categoria";
                const url = `${server}/live/${user}/${pass}/${item.stream_id}.${format}`;
                
                m3u += `#EXTINF:-1 tvg-id="${item.epg_channel_id || ''}" tvg-name="${name}" tvg-logo="${item.stream_icon || ''}" group-title="${catName}",${name}\n${url}\n`;
            });

            App.finishProcess(m3u, streams.length);
        },

        finishProcess: (content, count) => {
            const cleanPrefix = App.config.prefix.replace(/[^a-zA-Z0-9_-]/gi, '_');
            const finalFileName = `${cleanPrefix}_${App.config.expDateStr}.m3u`;

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const dlBtn = document.getElementById('downloadBtn');
            dlBtn.href = url;
            dlBtn.download = finalFileName;

            document.getElementById('statsText').innerHTML = `Pronto!<span>${count} Canais</span><div class="user-validity">Vence em: ${App.config.expDateStr}</div>`;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            
            App.showToast("Arquivo pronto para download!", "success");
        },

        resetForm: () => {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
        }
    };
</script>

</body>
</html>
