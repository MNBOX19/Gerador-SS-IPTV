<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3U Studio Pro - Multi Busca Inteligente</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(20, 20, 20, 0.7);
            --primary: #E50914; 
            --primary-hover: #b80710;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --success: #1db954;
            --warning: #f5a623;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at 50% 0%, #2a0808 0%, var(--bg-color) 60%);
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
            overflow-x: hidden;
        }
        
        .container { 
            background: var(--surface); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            padding: 40px 30px; width: 100%; max-width: 480px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .logo-txt { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .red-text { color: var(--primary); }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
        
        .form-group { margin-bottom: 16px; position: relative; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .inp { 
            width: 100%; padding: 15px 16px; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); color: #fff; font-weight: 500; 
            border-radius: 12px; font-size: 14px; transition: all 0.3s ease;
        }
        .inp:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.1); }
        .inp::placeholder { color: #555; }
        
        select.inp { appearance: none; cursor: pointer; font-weight: 600; }
        .select-wrapper::after {
            content: '\f078'; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; right: 18px; top: 42px; color: var(--text-muted); pointer-events: none; font-size: 12px; transition: 0.3s;
        }
        .select-wrapper:focus-within::after { color: var(--primary); transform: rotate(180deg); }

        .btn { 
            width: 100%; padding: 16px; margin-top: 10px; background: var(--primary); 
            color: #fff; border: none; font-weight: 700; border-radius: 12px; font-size: 16px; 
            cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(229, 9, 20, 0.4); }
        .btn:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-small {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); 
            font-weight: 600; border-radius: 10px; font-size: 13px; cursor: pointer; 
            transition: 0.2s; margin-bottom: 12px; display: flex; justify-content: center; gap: 8px; align-items: center;
        }
        .btn-small:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }

        .smart-box {
            display: none; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 14px; 
            border: 1px solid var(--border); margin-bottom: 16px;
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .smart-results {
            max-height: 220px; overflow-y: auto; background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            border-radius: 12px; margin-top: 10px;
        }
        
        .smart-results::-webkit-scrollbar { width: 6px; }
        .smart-results::-webkit-scrollbar-track { background: transparent; }
        .smart-results::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .smart-results::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .smart-item {
            padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; 
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .smart-item:last-child { border-bottom: none; }
        .smart-item img { width: 40px; height: 60px; border-radius: 6px; object-fit: cover; background: #222; }
        .smart-item .info { flex: 1; display: flex; flex-direction: column; }
        .smart-item .title { color: #eaeaea; font-size: 13px; font-weight: 600; line-height: 1.3; }
        .smart-item .meta { color: var(--text-muted); font-size: 11px; margin-top: 3px; }
        
        .smart-item:hover, .smart-item.selected { background: rgba(229, 9, 20, 0.1); }
        .smart-item.selected { border-left: 3px solid var(--primary); }

        .status-container { display: none; text-align: center; margin-top: 20px; animation: fadeIn 0.3s; }
        .loader {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        .status-text { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-area { margin-top: 25px; display: none; background: rgba(29, 185, 84, 0.1); padding: 25px; border-radius: 14px; border: 1px solid rgba(29, 185, 84, 0.3); text-align: center; animation: slideDown 0.4s; }
        .success-icon { font-size: 40px; color: var(--success); margin-bottom: 15px; }
        .stats { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; font-weight: 500; }
        .stats span { display: block; color: #fff; font-weight: 800; font-size: 24px; margin-top: 5px; }
        
        .btn-download {
            display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; padding: 15px; background: var(--success); 
            color: #111; text-decoration: none; border-radius: 12px; font-weight: 800; font-size: 15px; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.2);
        }
        .btn-download:hover { background: #1ed760; transform: translateY(-2px); box-shadow: 0 12px 25px rgba(29, 185, 84, 0.3); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); color: #fff; padding: 15px 20px; border-radius: 10px;
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-left: 4px solid var(--primary);
            animation: slideInRight 0.3s ease forwards; max-width: 300px;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.warning { border-left-color: var(--warning); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
    <div class="header">
        <div class="logo-txt"><i class="fas fa-play-circle red-text"></i> M3U <span class="red-text">STUDIO</span></div>
        <div class="subtitle">Gerador Avançado de Listas IPTV</div>
    </div>

    <form id="mainForm" onsubmit="event.preventDefault(); App.start();">
        <div class="form-group">
            <label>Credenciais do Servidor</label>
            <input type="url" id="serverUrl" class="inp" placeholder="URL DNS (Ex: http://tv.com:8080)" required autocomplete="url">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <input type="text" id="username" class="inp" placeholder="USUÁRIO" required autocomplete="username">
            </div>
            <div class="form-group" style="flex: 1;">
                <input type="password" id="password" class="inp" placeholder="SENHA" required autocomplete="current-password">
            </div>
        </div>
        
        <div class="form-group select-wrapper">
            <label>Tipo de Conteúdo</label>
            <select id="contentType" class="inp" onchange="App.handleTypeChange()">
                <option value="live">📺 TV AO VIVO (Completa)</option>
                <option value="movie">🎬 FILMES (Completa)</option>
                <option value="movie_smart">🔍 UM FILME ESPECÍFICO (Busca Inteligente)</option>
                <option value="series_smart">🔍 UMA SÉRIE ESPECÍFICA (Busca Inteligente)</option>
                <option value="all">📦 TUDO JUNTO (Lista Master)</option>
            </select>
        </div>

        <div id="smartBox" class="smart-box">
            <label id="smartLabel" style="font-size: 11px; color: var(--warning); display: block; margin-bottom: 12px;">LOCALIZAR MÍDIA:</label>
            
            <button type="button" class="btn-small" onclick="App.loadSmartDatabase()" id="btnLoadSmart">
                <i class="fas fa-cloud-download-alt"></i> Baixar Banco de Dados
            </button>
            
            <div id="smartSearchArea" style="display:none;">
                <div style="position: relative;">
                    <i class="fas fa-search" style="position: absolute; left: 15px; top: 15px; color: #777; font-size: 13px;"></i>
                    <input type="text" id="smartSearch" class="inp" placeholder="Digite para buscar..." oninput="App.filterSmartResults()" autocomplete="off" style="padding-left: 40px; background: rgba(0,0,0,0.6);">
                </div>
                <div id="smartResults" class="smart-results"></div>
            </div>

            <input type="hidden" id="selectedMediaId">
            <input type="hidden" id="selectedMediaName">
            <input type="hidden" id="selectedMediaCover">
            <input type="hidden" id="selectedMediaExt">
        </div>

        <div class="form-group select-wrapper">
            <label>Formato de Saída</label>
            <select id="format" class="inp">
                <option value="ts">MPEG-TS (.ts) - Padrão Smart TVs</option>
                <option value="m3u8">HLS (.m3u8) - Web / Mobile Apps</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nome do Arquivo (Opcional)</label>
            <input type="text" id="customFileName" class="inp" placeholder="Ex: Minha_Lista_Top" autocomplete="off">
        </div>
        
        <button type="submit" class="btn" id="btnSubmit">
            <i class="fas fa-bolt"></i> GERAR LISTA AGORA
        </button>
    </form>

    <div id="statusContainer" class="status-container">
        <div class="loader"></div>
        <div class="status-text" id="statusText">Conectando...</div>
    </div>

    <div id="resultArea" class="result-area">
        <i class="fas fa-check-circle success-icon"></i>
        <div class="stats" id="statsText"></div>
        <a id="downloadBtn" href="#" class="btn-download" download="lista.m3u">
            <i class="fas fa-download"></i> BAIXAR ARQUIVO
        </a>
        <button type="button" class="btn-small" style="margin-top: 15px; background: transparent; border: none; color: var(--text-muted);" onclick="App.resetForm()">
            Gerar Outra Lista
        </button>
    </div>
</div>

<script>
    const App = {
        config: { server: "", user: "", pass: "", format: "", type: "" },
        database: [],
        
        showToast: (msg, type = 'error') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'fa-exclamation-circle';
            if(type === 'success') icon = 'fa-check-circle';
            else if(type === 'warning') icon = 'fa-exclamation-triangle';

            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        },

        normalizeStr: (str) => {
            return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : "";
        },

        handleTypeChange: () => {
            const type = document.getElementById('contentType').value;
            const smartBox = document.getElementById('smartBox');
            const btnLoad = document.getElementById('btnLoadSmart');
            
            App.database = []; 
            
            if (['movie_smart', 'series_smart'].includes(type)) {
                smartBox.style.display = 'block';
                document.getElementById('smartSearchArea').style.display = 'none';
                document.getElementById('smartResults').innerHTML = '';
                document.getElementById('smartSearch').value = '';
                
                const isMovie = type === 'movie_smart';
                document.getElementById('smartLabel').innerText = isMovie ? "LOCALIZAR FILME:" : "LOCALIZAR SÉRIE:";
                btnLoad.innerHTML = `<i class="fas fa-cloud-download-alt"></i> Baixar Banco de ${isMovie ? 'Filmes' : 'Séries'}`;
                btnLoad.style.display = 'flex';
                btnLoad.disabled = false;
            } else {
                smartBox.style.display = 'none';
            }
        },

        fetchData: async (url, isJson = true) => {
            const timestamp = `_t=${new Date().getTime()}`;
            const finalUrl = url.includes('?') ? `${url}&${timestamp}` : `${url}?${timestamp}`;
            const isHttps = window.location.protocol === 'https:';
            const needsProxy = isHttps && finalUrl.startsWith('http://');
            
            const fetchDirect = async (targetUrl) => {
                const res = await fetch(targetUrl);
                if (!res.ok) throw new Error('Network response was not ok');
                return isJson ? await res.json() : await res.text();
            };

            const fetchProxy = async (targetUrl) => {
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error('Proxy failed');
                return isJson ? await res.json() : await res.text();
            };

            try {
                return needsProxy ? await fetchProxy(finalUrl) : await fetchDirect(finalUrl);
            } catch (error) {
                if (!needsProxy) {
                    try { return await fetchProxy(finalUrl); } 
                    catch (proxyErr) { return null; }
                }
                return null;
            }
        },

        loadSmartDatabase: async () => {
            const s = document.getElementById('serverUrl').value.trim().replace(/\/$/, "");
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const type = document.getElementById('contentType').value;

            if(!s || !u || !p) return App.showToast("Preencha URL, Usuário e Senha primeiro!", "warning");
            
            const server = s.startsWith('http') ? s : `http://${s}`;
            const btnLoad = document.getElementById('btnLoadSmart');
            
            btnLoad.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sincronizando...';
            btnLoad.disabled = true;

            const action = type === 'movie_smart' ? 'get_vod_streams' : 'get_series';
            const url = `${server}/player_api.php?username=${u}&password=${p}&action=${action}`;
            
            const data = await App.fetchData(url);
            btnLoad.style.display = 'none';
            
            if (data && data.length) {
                document.getElementById('smartSearchArea').style.display = 'block';
                App.database = data.sort((a, b) => (a.name || a.title || "").localeCompare(b.name || b.title || ""));
                App.filterSmartResults(); 
                document.getElementById('smartSearch').focus();
                App.showToast(`Banco carregado: ${data.length} itens.`, "success");
            } else {
                btnLoad.style.display = 'flex';
                btnLoad.innerHTML = '<i class="fas fa-redo"></i> Tentar Novamente';
                btnLoad.disabled = false;
                App.showToast("Nenhum conteúdo encontrado ou erro de login.", "error");
            }
        },

        filterSmartResults: () => {
            const query = App.normalizeStr(document.getElementById('smartSearch').value);
            const resultsBox = document.getElementById('smartResults');
            const type = document.getElementById('contentType').value;
            const isMovie = type === 'movie_smart';
            
            let html = "";
            let matchCount = 0;
            const maxResults = 100; 

            for(const item of App.database) {
                const nameRaw = item.name || item.title || "Desconhecido";
                
                if(App.normalizeStr(nameRaw).includes(query)) {
                    const id = isMovie ? item.stream_id : item.series_id;
                    const cover = (isMovie ? item.stream_icon : item.cover) || "";
                    const ext = isMovie ? (item.container_extension || "mp4") : "";
                    
                    const safeName = nameRaw.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const safeCover = cover.replace(/'/g, "\\'");
                    const imgFallback = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTUwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMjIyIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiM1NTUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjEyIj5TZW0gQ2FwYTwvdGV4dD48L3N2Zz4=";
                    
                    const year = item.year ? ` • ${item.year}` : '';
                    const rating = item.rating ? ` • ⭐ ${item.rating}` : '';

                    html += `
                        <div class="smart-item" onclick="App.selectMedia(${id}, '${safeName}', '${safeCover}', '${ext}', this)">
                            <img src="${cover || imgFallback}" onerror="this.src='${imgFallback}'" loading="lazy" alt="Capa">
                            <div class="info">
                                <div class="title">${nameRaw}</div>
                                <div class="meta">ID: ${id}${year}${rating}</div>
                            </div>
                        </div>`;
                    
                    if(++matchCount >= maxResults) break;
                }
            }

            resultsBox.innerHTML = matchCount ? html : '<div style="padding:20px; text-align:center; color:#777; font-size:12px;">Nenhuma mídia encontrada.</div>';
        },

        selectMedia: (id, name, cover, ext, element) => {
            document.getElementById('selectedMediaId').value = id;
            document.getElementById('selectedMediaName').value = name;
            document.getElementById('selectedMediaCover').value = cover;
            document.getElementById('selectedMediaExt').value = ext;
            document.getElementById('smartSearch').value = name;

            document.querySelectorAll('.smart-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        },

        start: async () => {
            const s = document.getElementById('serverUrl').value.trim().replace(/\/$/, "");
            App.config.server = s.startsWith('http') ? s : `http://${s}`;
            App.config.user = document.getElementById('username').value.trim();
            App.config.pass = document.getElementById('password').value.trim();
            App.config.format = document.getElementById('format').value;
            App.config.type = document.getElementById('contentType').value;

            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('statusContainer').style.display = 'block';
            
            App.updateStatus("Autenticando no Servidor...");

            try {
                if (['live', 'movie'].includes(App.config.type)) await App.generateCategoryBased();
                else if (App.config.type === 'series_smart') await App.generateSingleSeries();
                else if (App.config.type === 'movie_smart') await App.generateSingleMovie();
                else await App.generateFullDatabase();
            } catch (err) {
                App.handleError("Ocorreu um erro inesperado durante o processo.");
                console.error(err);
            }
        },

        updateStatus: (msg) => document.getElementById('statusText').innerText = msg,
        
        handleError: (msg) => {
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
            App.showToast(msg, "error");
        },

        generateCategoryBased: async () => {
            const { server, user, pass, type, format } = App.config;
            const isLive = type === 'live';
            const catAction = isLive ? 'get_live_categories' : 'get_vod_categories';
            const strmAction = isLive ? 'get_live_streams' : 'get_vod_streams';

            App.updateStatus("Baixando estrutura de categorias...");
            const cats = await App.fetchData(`${server}/player_api.php?username=${user}&password=${pass}&action=${catAction}`);
            if(!cats) return App.handleError("Falha ao obter categorias. Verifique o login.");

            const catMap = cats.reduce((map, c) => { map[c.category_id] = c.category_name; return map; }, {});

            App.updateStatus("Montando banco de dados (Isso pode demorar)...");
            const streams = await App.fetchData(`${server}/player_api.php?username=${user}&password=${pass}&action=${strmAction}`);
            if (!streams || !streams.length) return App.handleError("Nenhum conteúdo encontrado.");

            let m3u = '#EXTM3U size="Medium"\n';
            streams.forEach(item => {
                const name = item.name || item.title || "Unknown";
                const catName = catMap[item.category_id] || "Sem Categoria";
                const ext = isLive ? format : (item.container_extension || "mp4");
                const path = isLive ? "/live/" : "/movie/";
                const url = `${server}${path}${user}/${pass}/${item.stream_id || item.id}.${ext}`;
                
                m3u += `#EXTINF:-1 tvg-id="${item.epg_channel_id || ''}" tvg-name="${name}" tvg-logo="${item.stream_icon || ''}" group-title="${catName}",${name}\n${url}\n`;
            });

            App.finishProcess(m3u, streams.length, isLive ? "Canais" : "Filmes", isLive ? "tv_ao_vivo" : "filmes");
        },

        generateSingleMovie: async () => {
            const id = document.getElementById('selectedMediaId').value;
            if(!id) return App.handleError("Selecione um filme na lista de busca!");

            const name = document.getElementById('selectedMediaName').value;
            const cover = document.getElementById('selectedMediaCover').value;
            const ext = document.getElementById('selectedMediaExt').value || "mp4";
            const { server, user, pass } = App.config;

            App.updateStatus(`Gerando acesso para: ${name}...`);
            const url = `${server}/movie/${user}/${pass}/${id}.${ext}`;
            const m3u = `#EXTM3U size="Medium"\n#EXTINF:-1 tvg-id="" tvg-name="${name}" tvg-logo="${cover}" group-title="Filme Escolhido",${name}\n${url}\n`;
            
            App.finishProcess(m3u, 1, "Filme", name);
        },

        generateSingleSeries: async () => {
            const id = document.getElementById('selectedMediaId').value;
            if(!id) return App.handleError("Selecione uma série na lista de busca!");

            const name = document.getElementById('selectedMediaName').value;
            const cover = document.getElementById('selectedMediaCover').value;
            const { server, user, pass } = App.config;

            App.updateStatus(`Extraindo episódios de: ${name}...`);
            const data = await App.fetchData(`${server}/player_api.php?username=${user}&password=${pass}&action=get_series_info&series_id=${id}`);
            
            if(!data || !data.episodes) return App.handleError("Não foi possível carregar os episódios desta série.");

            let m3u = '#EXTM3U size="Medium"\n';
            let count = 0;

            Object.entries(data.episodes).forEach(([sKey, eps]) => {
                const sNum = parseInt(sKey).toString().padStart(2, '0');
                eps.forEach((ep, i) => {
                    const eNum = parseInt(ep.episode_num || (i+1)).toString().padStart(2, '0');
                    const ext = ep.container_extension || "mp4";
                    const url = `${server}/series/${user}/${pass}/${ep.id}.${ext}`;
                    const epTitle = `${name} - S${sNum}E${eNum} - ${ep.title || `Episódio ${eNum}`}`;
                    
                    m3u += `#EXTINF:-1 tvg-id="" tvg-name="${epTitle}" tvg-logo="${cover}" group-title="${name}",${epTitle}\n${url}\n`;
                    count++;
                });
            });

            App.finishProcess(m3u, count, "Episódios", name);
        },

        generateFullDatabase: async () => {
            const { server, user, pass, format } = App.config;
            App.updateStatus("Baixando base de dados master (Pode ser muito pesado)...");
            
            const rawUrl = `${server}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=${format}`;
            const textData = await App.fetchData(rawUrl, false);
            
            if(textData && textData.length > 100) {
                const count = (textData.match(/#EXTINF/g) || []).length;
                let m3u = textData.replace(/^#EXTM3U.*$/m, '#EXTM3U size="Medium"');
                if (!m3u.includes('#EXTM3U size="Medium"')) m3u = '#EXTM3U size="Medium"\n' + m3u;
                App.finishProcess(m3u, count, "Itens Totais", "lista_completa");
            } else {
                App.handleError("Falha ao extrair matriz. O servidor pode ter bloqueado requisições grandes.");
            }
        },

        // Função Atualizada com o Nome Personalizado
        finishProcess: (content, count, typeLabel, filenameBase) => {
            // Pega o valor digitado pelo usuário
            const customInput = document.getElementById('customFileName').value.trim();
            
            // Se o usuário digitou algo, usa o texto dele. Se não, usa o nome automático (filenameBase)
            const finalBaseName = customInput !== "" ? customInput : filenameBase;
            
            // Remove caracteres especiais para evitar bugs na hora de salvar no computador/celular
            const cleanName = finalBaseName.replace(/[^a-zA-Z0-9_-]/gi, '_');

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const dlBtn = document.getElementById('downloadBtn');
            dlBtn.href = url;
            dlBtn.download = `${cleanName}.m3u`;

            document.getElementById('statsText').innerHTML = `Geração Concluída!<span>${count} ${typeLabel}</span>`;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            
            App.showToast("Lista gerada com sucesso!", "success");
        },

        resetForm: () => {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
        }
    };
</script>
